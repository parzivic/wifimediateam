<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WifiMedia Invoice | Multi-Service Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --brand-dark: #1e2a3e;
            --brand-accent: #f5b042;
            --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-gradient);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .dashboard {
            max-width: 1400px;
            width: 100%;
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 2rem;
            height: 95vh;
        }

        .form-panel {
            background: white;
            border-radius: 1.25rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .form-panel h2 { font-size: 1.5rem; color: var(--brand-dark); margin-bottom: 0.5rem; }

        .sub {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 1.5rem;
            padding-left: 0.5rem;
            border-left: 3px solid var(--brand-accent);
        }

        .form-group { margin-bottom: 1rem; }
        .form-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #475569;
            margin-bottom: 0.4rem;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 0.65rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--brand-accent);
            box-shadow: 0 0 0 3px rgba(245, 176, 66, 0.15);
        }

        .row-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

        .service-box {
            background: #f8fafc;
            padding: 1rem;
            border-radius: 0.75rem;
            border: 1px solid #e2e8f0;
            margin-bottom: 1rem;
        }

        .hidden { display: none; }

        .actions { margin-top: auto; display: flex; gap: 1rem; padding-top: 1rem; }

        button {
            flex: 1;
            padding: 0.8rem;
            border-radius: 0.75rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-refresh { background: #f1f5f9; color: #475569; }
        .btn-save { background: var(--brand-dark); color: white; }
        .btn-save:hover { background: #0f172a; transform: translateY(-1px); }

        /* PREVIEW PANEL */
        .preview-panel {
            background: #cbd5e1;
            border-radius: 1.25rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow: auto;
            padding: 2rem;
            position: relative;
        }

        .a4-container {
            background: white;
            width: 794px;
            height: 1123px;
            min-width: 794px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            transform: scale(0.7);
            transform-origin: top center;
        }

        .invoice-wrapper {
            padding: 4rem;
            height: 100%;
            display: flex;
            flex-direction: column;
            color: #1e293b;
        }

        .invoice-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 3rem;
        }

        .brand h1 { font-size: 2.5rem; font-weight: 900; letter-spacing: -1px; color: var(--brand-dark); }

        .video-badge {
            display: inline-block;
            margin-top: 0.5rem;
            background: #fef3c7;
            color: #92400e;
            padding: 0.25rem 0.75rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .inv-details { text-align: right; }
        .inv-details h2 { font-size: 1.5rem; color: #94a3b8; margin-bottom: 0.2rem; }

        .grid-addresses { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; margin-bottom: 3rem; }
        .address-box h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--brand-accent);
            margin-bottom: 0.75rem;
            letter-spacing: 1px;
        }
        .address-box p { font-size: 0.9rem; line-height: 1.6; white-space: pre-line; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 2rem; }
        th {
            text-align: left;
            padding: 1rem;
            background: #f8fafc;
            border-bottom: 2px solid #e2e8f0;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #64748b;
        }
        td { padding: 1.5rem 1rem; border-bottom: 1px solid #f1f5f9; font-size: 1rem; }

        .total-section { margin-left: auto; width: 320px; margin-top: 1rem; }
        .total-row {
            display: flex;
            justify-content: space-between;
            padding: 1.2rem;
            background: var(--brand-dark);
            color: white;
            border-radius: 0.5rem;
            font-weight: 800;
            font-size: 1.25rem;
        }

        .footer {
            margin-top: auto;
            padding-top: 2rem;
            border-top: 1px solid #f1f5f9;
            font-size: 0.8rem;
            color: #94a3b8;
            display: flex;
            justify-content: space-between;
        }

        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            color: white;
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        @media (max-width: 1100px) {
            .dashboard { grid-template-columns: 1fr; height: auto; }
            .preview-panel { height: 700px; }
            .a4-container { transform: scale(0.5); }
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="loader">Processing High-Res Export...</div>

<div class="dashboard">
    <div class="form-panel">
        <div>
            <h2>WifiMedia</h2>
            <div class="sub">Invoice Editor • Flexible Billing</div>
        </div>

        <div class="row-2col">
            <div class="form-group">
                <label>Invoice #</label>
                <input type="text" id="invoiceNumber" value="#001">
            </div>
            <div class="form-group">
                <label>Issue Date</label>
                <input type="date" id="issueDate">
            </div>
        </div>

        <div class="form-group">
            <label>Service Type</label>
            <select id="serviceType" onchange="toggleServiceFields()">
                <option value="video">Video Editing (Monthly/Pro-rata)</option>
                <option value="thumbnail">Thumbnail Design (Per Unit)</option>
            </select>
        </div>

        <div id="videoFields" class="service-box">
            <div class="form-group">
                <label><input type="checkbox" id="useProrata" checked onchange="renderInvoice()"> Enable Pro-Rata</label>
            </div>
            <div class="row-2col">
                <div class="form-group">
                    <label>Monthly Rate ($)</label>
                    <input type="number" id="monthlyRate" value="250" oninput="renderInvoice()">
                </div>
                <div class="form-group">
                    <label>Start Date</label>
                    <input type="date" id="startDate" onchange="renderInvoice()">
                </div>
            </div>
        </div>

        <div id="thumbnailFields" class="service-box hidden">
            <div class="row-2col">
                <div class="form-group">
                    <label>Rate per Thumb ($)</label>
                    <input type="number" id="thumbRate" value="15" oninput="renderInvoice()">
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" id="thumbQty" value="1" oninput="renderInvoice()">
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Project Description</label>
            <input type="text" id="itemDesc" value="YouTube Video Editing Services" oninput="renderInvoice()">
        </div>

        <div class="form-group">
            <label>Bill To</label>
            <textarea id="toDetails" rows="3">Andy Yuting Lay
5 Harvey place, Cherrybrook
ABN: 27 713 996 084</textarea>
        </div>

        <div class="actions">
            <button class="btn-refresh" onclick="renderInvoice()">Refresh</button>
            <button class="btn-save" onclick="saveInvoice()">Save PNG</button>
        </div>
    </div>

    <div class="preview-panel">
        <div class="a4-container" id="captureArea">
            <div class="invoice-wrapper" id="invoiceContent"></div>
        </div>
    </div>
</div>

<script>
    function toggleServiceFields() {
        const type = document.getElementById('serviceType').value;
        const desc = document.getElementById('itemDesc');
        
        if (type === 'video') {
            document.getElementById('videoFields').classList.remove('hidden');
            document.getElementById('thumbnailFields').classList.add('hidden');
            desc.value = "YouTube Video Editing Services";
        } else {
            document.getElementById('videoFields').classList.add('hidden');
            document.getElementById('thumbnailFields').classList.remove('hidden');
            desc.value = "High-Quality Thumbnail Design";
        }
        renderInvoice();
    }

    function getDaysInMonth(date) {
        return new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
    }

    function renderInvoice() {
        const type = document.getElementById('serviceType').value;
        const issueDate = new Date(document.getElementById('issueDate').value);
        let totalAmount = 0;
        let subText = "";

        if (type === 'video') {
            const rate = parseFloat(document.getElementById('monthlyRate').value) || 0;
            const start = new Date(document.getElementById('startDate').value);
            const isProrated = document.getElementById('useProrata').checked;
            
            if (isProrated && !isNaN(start.getTime())) {
                const daysInMonth = getDaysInMonth(start);
                const billableDays = (daysInMonth - start.getDate()) + 1;
                const dailyRate = rate / daysInMonth;
                totalAmount = dailyRate * billableDays;
                subText = `Pro-rated: ${billableDays}/${daysInMonth} days ($${dailyRate.toFixed(2)}/day)`;
            } else {
                totalAmount = rate;
                subText = "Full monthly subscription";
            }
        } else {
            const rate = parseFloat(document.getElementById('thumbRate').value) || 0;
            const qty = parseInt(document.getElementById('thumbQty').value) || 0;
            totalAmount = rate * qty;
            subText = `Quantity: ${qty} units @ $${rate.toFixed(2)} each`;
        }

        const data = {
            num: document.getElementById('invoiceNumber').value,
            date: issueDate.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }),
            to: document.getElementById('toDetails').value.replace(/\n/g, '<br>'),
            desc: document.getElementById('itemDesc').value,
            total: totalAmount.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}),
            badge: type === 'video' ? 'VIDEO EDITING SERVICE' : 'THUMBNAIL DESIGN'
        };

        document.getElementById('invoiceContent').innerHTML = `
            <div class="invoice-header">
                <div class="brand">
                    <h1>WifiMedia</h1>
                    <div class="video-badge">${data.badge}</div>
                </div>
                <div class="inv-details">
                    <h2>INVOICE</h2>
                    <p><strong>${data.num}</strong></p>
                    <p>${data.date}</p>
                </div>
            </div>

            <div class="grid-addresses">
                <div class="address-box">
                    <h3>Issued By</h3>
                    <p>Victor Pelemer<br>7016 Pagadian City, ZDS<br>pelemervictor20@gmail.com</p>
                </div>
                <div class="address-box">
                    <h3>Bill To</h3>
                    <p>${data.to}</p>
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th style="width: 70%">Description</th>
                        <th style="text-align: right">Amount</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><strong>${data.desc}</strong><br><small style="color:#64748b">${subText}</small></td>
                        <td style="text-align: right; font-weight: 600;">$${data.total}</td>
                    </tr>
                </tbody>
            </table>

            <div class="total-section">
                <div class="total-row"><span>Total Due</span><span>$${data.total} USD</span></div>
            </div>

            <div class="footer">
                <div>Payment via Wise (USD)</div>
                <div>Thank you for your business!</div>
            </div>
        `;
    }

    async function saveInvoice() {
        const el = document.getElementById('captureArea');
        const loader = document.getElementById('loader');
        loader.style.display = 'flex';
        const originalTransform = el.style.transform;
        el.style.transform = 'none';
        
        try {
            const canvas = await html2canvas(el, { scale: 3, useCORS: true, backgroundColor: '#ffffff' });
            const link = document.createElement('a');
            link.download = `WifiMedia_${document.getElementById('invoiceNumber').value}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        } catch (e) { alert('Export failed.'); } 
        finally {
            el.style.transform = originalTransform;
            loader.style.display = 'none';
        }
    }

    document.getElementById('issueDate').valueAsDate = new Date();
    document.getElementById('startDate').value = new Date().toISOString().split('T')[0];
    renderInvoice();
</script>

</body>
</html>
